<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Foundation Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#080c14;--card:#0f1623;--border:#1a2540;--text:#e8edf5;--dim:#5a6a8a;--accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono',Monaco,monospace;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}
.hdr{background:linear-gradient(135deg,#0f1623 0%,#1a1a3e 100%);padding:24px 28px;border-bottom:2px solid var(--accent)}
.hdr-inner{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:2px}
.hdr h1 .t{color:var(--gold)}.hdr h1 .f{color:var(--accent)}
.hdr .sub{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:1px}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
.hero{background:linear-gradient(135deg,rgba(245,158,11,.08) 0%,rgba(59,130,246,.05) 100%);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px}
.hero h2{font-size:16px;color:var(--accent);margin-bottom:16px;letter-spacing:1px}
.wealth-row{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.wealth-total{font-size:42px;font-weight:800;background:linear-gradient(90deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wealth-sub{font-size:13px;color:var(--dim)}
.progress-section{margin-top:20px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.progress-label .pct{color:var(--gold);font-weight:700}
.progress-bg{background:rgba(255,255,255,.06);border-radius:10px;height:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .6s}
.progress-markers{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.c{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.c:hover{border-color:var(--accent);transition:border-color .3s}
.cl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:8px}
.cv{font-size:24px;font-weight:700}.cs{font-size:11px;margin-top:4px;color:var(--dim)}
.cv.green{color:var(--green)}.cv.gold{color:var(--gold)}.cv.accent{color:var(--accent)}.cv.blue{color:var(--blue)}
.sec{margin-bottom:24px}
.sec-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:10px;font-size:13px;border-bottom:1px solid rgba(26,37,64,.5)}
.r{text-align:right}
.hf{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.hf.green{background:rgba(16,185,129,.12);color:var(--green)}
.hf.red{background:rgba(239,68,68,.12);color:var(--red)}
.hf.blue{background:rgba(59,130,246,.12);color:var(--blue)}
.hf.gold{background:rgba(251,191,36,.12);color:var(--gold)}
.chart-h{position:relative;height:220px;margin-top:8px}
.token-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(26,37,64,.3)}
.token-row:last-child{border:none}
.token-info{display:flex;align-items:center;gap:10px}
.token-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.token-name{font-size:12px}.token-bal{font-size:12px;font-weight:600}.token-usd{font-size:11px;color:var(--dim)}
.pos-card{background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.15);border-radius:10px;padding:14px;margin-bottom:8px}
.pos-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pos-proto{font-size:12px;color:var(--blue);font-weight:600}
.pos-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0}
.pos-label{color:var(--dim)}.pos-val{font-weight:600}
.updated{font-size:10px;color:var(--dim);text-align:right;margin-top:8px}
@media(max-width:768px){.grid4,.grid3{grid-template-columns:1fr}.hdr h1{font-size:18px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div><h1><span class="t">TIGER</span> <span class="f">FOUNDATION</span></h1><div class="sub">WEALTH & INVESTMENT DASHBOARD</div></div>
    <div></div>
  </div>
</div>
<div class="wrap">
  <div class="hero">
    <h2>WEALTH OVERVIEW</h2>
    <div class="wealth-row"><div class="wealth-total" id="totalVal"></div></div>
    <div class="wealth-sub" id="totalBreakdown"></div>
    <div class="progress-section">
      <div class="progress-label"><span>PROGRESS TO TARGET: <span style="color:var(--text)">$8,000 USDC</span></span><span class="pct" id="pctVal">0%</span></div>
      <div class="progress-bg"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div class="progress-markers"><span>$0</span><span>$2K</span><span>$4K</span><span>$6K</span><span>$8K</span></div>
    </div>
  </div>
  <div class="grid4">
    <div class="c"><div class="cl">On-Chain</div><div class="cv" id="onchainVal"></div><div class="cs">Liquid + DeFi</div></div>
    <div class="c"><div class="cl">Pending Rewards</div><div class="cv gold" id="rewardsVal"></div><div class="cs">Unclaimed KAT</div></div>
    <div class="c"><div class="cl">LP Position</div><div class="cv accent" id="lpVal"></div><div class="cs">SushiSwap V3</div></div>
    <div class="c"><div class="cl">Chain</div><div class="cv blue">Katana</div><div class="cs"><span style="color:var(--green)">&#9679;</span> Online</div></div>
  </div>
  <div class="sec"><div class="sec-title">Token Balances</div><div class="c" id="tokenList"></div></div>
  <div class="sec"><div class="sec-title">DeFi Positions</div><div id="defiList"></div></div>
  <div class="sec"><div class="sec-title">Total Asset Value History</div><div class="c"><div class="chart-h" style="height:260px"><canvas id="historyChart"></canvas></div></div></div>
</div>
<script>
var DATA = {
  "grandTotalUSD": 1087.08,
  "onchainTotalUSD": 11.11,
  "lpUSD": 1026.6799999999998,
  "balances": {
    "ETH": {
      "balance": 0.000415161580569108,
      "priceUSD": 1873.68,
      "valueUSD": 0.78
    },
    "KAT": {
      "balance": 132.21348411307065,
      "priceUSD": 0.006647644446407574,
      "valueUSD": 0.88
    },
    "WETH": {
      "balance": 3.129985135022e-06,
      "priceUSD": 1873.68,
      "valueUSD": 0.01
    },
    "SOL": {
      "balance": 0.117296042,
      "priceUSD": 80.44,
      "valueUSD": 9.44
    },
    "USDC": {
      "balance": 0.013159,
      "priceUSD": 1.0,
      "valueUSD": 0.01
    }
  },
  "morphoPosition": {
    "collateralAmount": 27999.377858914748,
    "collateralToken": "avKAT",
    "borrowAmount": 24214.99923264987,
    "loanToken": "KAT",
    "netPositionKAT": 3784.38,
    "valueUSD": 25.16,
    "lltv": "77%"
  },
  "merklRewards": {
    "totalUnclaimedUSD": 24.13,
    "rewards": [
      {
        "symbol": "KAT",
        "unclaimed": 3629.814109487851,
        "unclaimedUSD": 24.13
      }
    ]
  },
  "lastUpdated": "2026-06-03T02:00:00.000000+00:00",
  "perpsTickers": []
};

function fmt(v,d){d=d===undefined?2:d;if(v===null||v===undefined)return'---';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';if(v<0.01)return'$'+v.toFixed(6);if(v<1)return'$'+v.toFixed(4);return'$'+v.toFixed(d)}
function fmtN(v){return Number(v).toLocaleString('en-US',{maximumFractionDigits:4})}
var TC={ETH:'#627EEA',KAT:'#F59E0B',WETH:'#627EEA',USDC:'#2775CA',USDT:'#26A17B',WBTC:'#F7931A',MORPHO:'#A855F7',SUSHI:'#FA52A0'};

var d=DATA,h=HISTORY;
var onchain=d.onchainTotalUSD||0;
var pending=(d.merklRewards&&d.merklRewards.totalUnclaimedUSD)||0;
var lp=d.lpUSD||0;
var total=d.grandTotalUSD||(onchain+pending+lp);
var pct=Math.min(100,(total/8000)*100);

document.getElementById('totalVal').textContent=fmt(total);
document.getElementById('totalBreakdown').textContent=fmt(onchain)+' on-chain + '+fmt(lp)+' LP + '+fmt(pending)+' pending';
document.getElementById('progFill').style.width=pct.toFixed(1)+'%';
document.getElementById('pctVal').textContent=pct.toFixed(1)+'%';
document.getElementById('onchainVal').textContent=fmt(onchain);
document.getElementById('rewardsVal').textContent=fmt(pending);
document.getElementById('lpVal').textContent=fmt(lp);

var tl='';
var bal=d.balances||{};
Object.keys(bal).forEach(function(sym){
  var b=bal[sym];
  if(!b||b.balance===0)return;
  var col=TC[sym]||'#5a6a8a';
  tl+='<div class="token-row"><div class="token-info"><div class="token-icon" style="background:'+col+'22;color:'+col+'">'+sym.slice(0,3)+'</div><div><div class="token-name">'+sym+'</div><div class="token-usd">$'+b.priceUSD+'</div></div></div><div class="r"><div class="token-bal">'+fmtN(b.balance)+'</div><div class="token-usd">'+fmt(b.valueUSD)+'</div></div></div>';
});
document.getElementById('tokenList').innerHTML=tl||'<p style="color:var(--dim);font-size:12px">No token balances</p>';

var dl='';
if(d.morphoPosition){
  var mp=d.morphoPosition;
  dl+='<div class="pos-card"><div class="pos-head"><span class="pos-proto">Morpho Blue</span><span class="hf blue">Lending</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">Collateral</span><span class="pos-val">'+fmtN(mp.collateralAmount)+' '+mp.collateralToken+'</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">Debt</span><span class="pos-val" style="color:var(--red)">'+fmtN(mp.borrowAmount)+' '+mp.loanToken+'</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">Net</span><span class="pos-val gold">'+fmtN(mp.netPositionKAT)+' KAT = '+fmt(mp.valueUSD)+'</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">LLTV</span><span class="pos-val">'+mp.lltv+'</span></div></div>';
}
if(lp>0){
  dl+='<div class="pos-card"><div class="pos-head"><span class="pos-proto">SushiSwap V3</span><span class="hf gold">LP</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">Pair</span><span class="pos-val">vbUSDC / KAT</span></div>';
  dl+='<div class="pos-row"><span class="pos-label">Value</span><span class="pos-val gold" style="font-size:14px">$'+lp.toFixed(2)+'</span></div></div>';
}
document.getElementById('defiList').innerHTML=dl;

var hd=(h&&h.data)?h.data:[];
if(hd.length>0){
  var labels=hd.map(function(x){return x.date?x.date.slice(5):''});
  var totals=hd.map(function(x){return x.total_usd||0});
  new Chart(document.getElementById('historyChart').getContext('2d'),{
    type:'line',
    data:{labels:labels,datasets:[{label:'Total Value',data:totals,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.08)',borderWidth:2.5,fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#f59e0b',pointBorderColor:'#080c14',pointBorderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{labels:{color:'#5a6a8a',font:{size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:'#1a2540',titleColor:'#e8edf5',bodyColor:'#e8edf5',borderColor:'#f59e0b',borderWidth:1,callbacks:{label:function(ctx){return ctx.dataset.label+': $'+Number(ctx.raw).toFixed(2)}}}},
      scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#5a6a8a',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#5a6a8a',font:{size:10},callback:function(v){return '$'+v.toFixed(0)}}}}
    }
  });
}
</script>
</body>
</html>
